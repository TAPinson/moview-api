schema {
  query: Query
  mutation: Mutation
}

type Query {
  health: Health!
  users: Users!
  movies: Movies!
}

type Mutation {
  updateUser(input: UpdateUserProfileInput!): UserProfile!
  createProfilePhotoUpload(contentType: String!): ProfilePhotoUpload!
  addLike(movieId: Int!): MovieLike!
  removeLike(movieId: Int!): Boolean!
  addToWatchlist(movieId: Int!): WatchlistItem!
  markWatched(movieId: Int!): WatchlistItem!
  removeFromWatchlist(movieId: Int!): Boolean!
  sendFriendRequest(userId: Int!): Friendship!
  acceptFriendRequest(userId: Int!): Friendship!
  declineFriendRequest(userId: Int!): Boolean!
  cancelFriendRequest(userId: Int!): Boolean!
  removeFriend(userId: Int!): Boolean!
}

input UpdateUserProfileInput {
  username: String!
  firstName: String
  lastName: String
}

type ProfilePhotoUpload {
  url: String!
  fields: [ProfilePhotoUploadField!]!
}

type ProfilePhotoUploadField {
  name: String!
  value: String!
}

type Health {
  ok: Boolean!
  service: String!
}

type Users {
  profile: UserProfile!
  watchlist(status: WatchlistStatus): [WatchlistItem!]!
  sharedWatchlist(friendUserId: Int!): [WatchlistItem!]!
  watchlistEntries: [WatchlistEntry!]!
  likes: [MovieLike!]!
  findUsers(query: String!): [PublicUserProfile!]!
  friends: [Friendship!]!
  incomingFriendRequests: [Friendship!]!
  outgoingFriendRequests: [Friendship!]!
}

type Movies {
  search(query: String!): [MovieSearchResult!]!
  byGenre(genreId: Int!, page: Int!): MovieResultPage!
}

enum WatchlistStatus {
  want_to_watch
  watching
  watched
}

type WatchlistItem {
  userId: Int!
  movieId: Int!
  status: WatchlistStatus!
  addedAt: String!
  watchedAt: String
  notes: String
  movie: MovieSearchResult
}

type WatchlistEntry {
  userId: Int!
  movieId: Int!
  status: WatchlistStatus!
}

type MovieLike {
  userId: Int!
  movieId: Int!
  createdAt: String!
  movie: MovieSearchResult
}

type MovieResultPage {
  page: Int!
  totalPages: Int!
  results: [MovieSearchResult!]!
}

type MovieSearchResult {
  poster_path: String
  adult: Boolean
  overview: String
  release_date: String
  genre_ids: [Int!]!
  id: Int
  original_title: String
  original_language: String
  title: String
  backdrop_path: String
  popularity: Float
  vote_count: Int
  video: Boolean
  vote_average: Float
}

type PublicUserProfile {
  id: Int!
  username: String!
  firstName: String
  lastName: String
  profilePhotoUrl: String
}

enum FriendshipStatus {
  pending
  accepted
}

type Friendship {
  user: PublicUserProfile!
  status: FriendshipStatus!
  createdAt: String!
  updatedAt: String!
}

type UserProfile {
  id: Int!
  username: String!
  email: String!
  admin: Boolean!
  firstName: String
  lastName: String
  profilePhotoUrl: String
}
