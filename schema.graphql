schema {
  query: Query
  mutation: Mutation
}

type Query {
  health: Health!
  hello(name: String): Greeting!
  me: UserProfile!
}

type Mutation {
  updateUser(input: UpdateUserProfileInput!): UserProfile!
}

input UpdateUserProfileInput {
  username: String!
  firstName: String
  lastName: String
}

type Health {
  ok: Boolean!
  service: String!
}

type Greeting {
  message: String!
  requestId: String
}

type UserProfile {
  id: Int!
  username: String!
  email: String!
  admin: Boolean!
  firstName: String
  lastName: String
}
