schema {
  query: Query
  mutation: Mutation
}

type Query {
  health: Health!
  users: Users!
  movies: Movies!
}

type Mutation {
  updateUser(input: UpdateUserProfileInput!): UserProfile!
  addLike(movieId: Int!): MovieLike!
  addToWatchlist(movieId: Int!): WatchlistItem!
  markWatched(movieId: Int!): WatchlistItem!
  removeFromWatchlist(movieId: Int!): Boolean!
}

input UpdateUserProfileInput {
  username: String!
  firstName: String
  lastName: String
}

type Health {
  ok: Boolean!
  service: String!
}

type Users {
  profile: UserProfile!
  watchlist(status: WatchlistStatus): [WatchlistItem!]!
}

type Movies {
  search(query: String!): [MovieSearchResult!]!
}

enum WatchlistStatus {
  want_to_watch
  watching
  watched
}

type WatchlistItem {
  userId: Int!
  movieId: Int!
  status: WatchlistStatus!
  addedAt: String!
  watchedAt: String
  notes: String
}

type MovieLike {
  userId: Int!
  movieId: Int!
  createdAt: String!
}

type MovieSearchResult {
  poster_path: String
  adult: Boolean
  overview: String
  release_date: String
  genre_ids: [Int!]!
  id: Int
  original_title: String
  original_language: String
  title: String
  backdrop_path: String
  popularity: Float
  vote_count: Int
  video: Boolean
  vote_average: Float
}

type UserProfile {
  id: Int!
  username: String!
  email: String!
  admin: Boolean!
  firstName: String
  lastName: String
}
