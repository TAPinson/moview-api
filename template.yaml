AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: moview-api Python GraphQL Lambda

Parameters:
  DatabaseUrlSecretArn:
    Type: String
    NoEcho: true
    Description: ARN of the Secrets Manager secret containing the Neon DATABASE_URL.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 256
    Architectures:
      - x86_64

Resources:
  MoviewUserPool:
    Type: AWS::Cognito::UserPool
    DependsOn:
      - MoviewUserPoolInvokeFunctionPermission
    Properties:
      UserPoolName: moview-api-users
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false
      LambdaConfig:
        PostConfirmation: !GetAtt MoviewApiFunction.Arn

  MoviewUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: moview-ui
      UserPoolId: !Ref MoviewUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  MoviewGraphQLApi:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: moview-api
      AuthenticationType: AMAZON_COGNITO_USER_POOLS
      UserPoolConfig:
        AwsRegion: !Ref AWS::Region
        UserPoolId: !Ref MoviewUserPool
        DefaultAction: ALLOW

  MoviewGraphQLSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId: !GetAtt MoviewGraphQLApi.ApiId
      Definition: |
        schema {
          query: Query
          mutation: Mutation
        }

        type Query {
          health: Health!
          users: Users!
          movies: Movies!
        }

        type Mutation {
          updateUser(input: UpdateUserProfileInput!): UserProfile!
          addLike(movieId: Int!): MovieLike!
          removeLike(movieId: Int!): Boolean!
          addToWatchlist(movieId: Int!): WatchlistItem!
          markWatched(movieId: Int!): WatchlistItem!
          removeFromWatchlist(movieId: Int!): Boolean!
          sendFriendRequest(userId: Int!): Friendship!
          acceptFriendRequest(userId: Int!): Friendship!
          declineFriendRequest(userId: Int!): Boolean!
          cancelFriendRequest(userId: Int!): Boolean!
          removeFriend(userId: Int!): Boolean!
        }

        input UpdateUserProfileInput {
          username: String!
          firstName: String
          lastName: String
        }

        type Health {
          ok: Boolean!
          service: String!
        }

        type Users {
          profile: UserProfile!
          watchlist(status: WatchlistStatus): [WatchlistItem!]!
          watchlistEntries: [WatchlistEntry!]!
          likes: [MovieLike!]!
          findUsers(query: String!): [PublicUserProfile!]!
          friends: [Friendship!]!
          incomingFriendRequests: [Friendship!]!
          outgoingFriendRequests: [Friendship!]!
        }

        type Movies {
          search(query: String!): [MovieSearchResult!]!
          byGenre(genreId: Int!, page: Int!): MovieResultPage!
        }

        enum WatchlistStatus {
          want_to_watch
          watching
          watched
        }

        type WatchlistItem {
          userId: Int!
          movieId: Int!
          status: WatchlistStatus!
          addedAt: String!
          watchedAt: String
          notes: String
          movie: MovieSearchResult
        }

        type WatchlistEntry {
          userId: Int!
          movieId: Int!
          status: WatchlistStatus!
        }

        type MovieLike {
          userId: Int!
          movieId: Int!
          createdAt: String!
          movie: MovieSearchResult
        }

        type MovieResultPage {
          page: Int!
          totalPages: Int!
          results: [MovieSearchResult!]!
        }

        type MovieSearchResult {
          poster_path: String
          adult: Boolean
          overview: String
          release_date: String
          genre_ids: [Int!]!
          id: Int
          original_title: String
          original_language: String
          title: String
          backdrop_path: String
          popularity: Float
          vote_count: Int
          video: Boolean
          vote_average: Float
        }

        type PublicUserProfile {
          id: Int!
          username: String!
          firstName: String
          lastName: String
        }

        enum FriendshipStatus {
          pending
          accepted
        }

        type Friendship {
          user: PublicUserProfile!
          status: FriendshipStatus!
          createdAt: String!
          updatedAt: String!
        }

        type UserProfile {
          id: Int!
          username: String!
          email: String!
          admin: Boolean!
          firstName: String
          lastName: String
        }

  MoviewApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: ali_api.handler.lambda_handler
      Environment:
        Variables:
          DATABASE_URL_SECRET_ARN: !Ref DatabaseUrlSecretArn
          TMDB_API_KEY_SECRET_ID: dev/tmdb-api-key
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Ref DatabaseUrlSecretArn
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:dev/tmdb-api-key-*
  MoviewUserPoolInvokeFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref MoviewApiFunction
      Principal: cognito-idp.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  MoviewAppSyncServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeMoviewApiFunction
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt MoviewApiFunction.Arn

  MoviewLambdaDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt MoviewGraphQLApi.ApiId
      Name: MoviewApiLambda
      Type: AWS_LAMBDA
      ServiceRoleArn: !GetAtt MoviewAppSyncServiceRole.Arn
      LambdaConfig:
        LambdaFunctionArn: !GetAtt MoviewApiFunction.Arn

  HealthResolver:
    Type: AWS::AppSync::Resolver
    DependsOn:
      - MoviewGraphQLSchema
    Properties:
      ApiId: !GetAtt MoviewGraphQLApi.ApiId
      TypeName: Query
      FieldName: health
      DataSourceName: !GetAtt MoviewLambdaDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2017-02-28",
          "operation": "Invoke",
          "payload": $util.toJson($context)
        }
      ResponseMappingTemplate: $util.toJson($context.result)

